<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background-color: #E3CAA5;
            margin:0;
        }
        .calculator{
            width: 300px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 16px #461901;
            padding: 20px;
        }
        .display{
            width: 100%;
            height: 50px;
            text-align: right;
            font-size: 1.5 rem;
            margin-bottom: 20px;
            border: none;
            background-color:#AD8B73 ;
            border-radius: 8px;
            color:#FFFBE9;
        }
        .buttons{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 10px;
        }
        .button{
            background-color: #795548;
            border: none;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            border-radius: 10px;
            transition: background-color 0.3s,transform 0.2s;
            color:white;
        }
        .button:hover{
            background-color:#271d19 ;
            transform: scale(1.3);
        }
        .button:active{
            transform: (0.99);
        }
        .button.clear{
            background-color: #c4b092;
        }
        .button.equal{
            background-color: #a89578;
        }
        .button.equal:hover{
            background-color: antiquewhite;
        }
        .button.operator{
            background-color: #9c8562;
        }
        .button.equal:hover{
            background-color: #665438;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" class="display"  disabled>
        <div class="buttons">
          <button class="button clear" onclick="clearDisplay()">C</button>  
          <button class="button operator" onclick="appendOperation('/')">/</button>
          <button class="button operator" onclick="appendOperation('*')">*</button>
          <button class="button operator" onclick="appendOperation('-')">-</button>

          <button class="button" onclick="appendNumber('7')">7</button>
          <button class="button" onclick="appendNumber('8')">8</button>
          <button class="button" onclick="appendNumber('9')">9</button>
           <button class="button operator" onclick="appendOperation('+')">+</button>

           <button class="button" onclick="appendNumber('4')">4</button>
           <button class="button" onclick="appendNumber('5')">5</button>
           <button class="button" onclick="appendNumber('6')">6</button>
           <button class="button equal" onclick="calculate()">=</button>

           <button class="button" onclick="appendNumber('1')">1</button>
           <button class="button" onclick="appendNumber('2')">2</button>
           <button class="button" onclick="appendNumber('3')">3</button>
           <button class="button" onclick="appendNumber('0')">0</button>
        </div>
    </div>
    <script language="javascript">
        let currentInput='';
        let currentOperation='';
        let peviousInput='';

        function appendNumber(number){
            currentInput += number;
            document.getElementById('display').value=`${peviousInput} ${currentInput} 
            ${currentInput}`;
        }
        function appendOperation(operation){
            if (currentInput==='')return;
            if(peviousInput !==''){
                calculate();
             }  
            }
             currentOperation=operation;
             peviousInput=currentInput;
             currentInput='';
             document.getElementById('display').value=`${peviousInput} ${currentInput}`;

             function calculate(){
                if(peviousInput==='' || currentInput==='') return;
                let result;
                let prev=parseFloat(peviousInput);
                let current=parseFloat(currentInput);

                switch(currentOperation){
                    case'+':
                    result=prev+current;
                    break;
                    case'-':
                     result=prev-current;
                     break;
                     case'*':
                    result=prev*current;
                    break;
                     case'/':
                    if(current===0){
                        aler("cannot divide by zero");
                        return;
                    }
                    result=prev/current
                    break;
                    default:
                        return;
                }
                currentInput=result.toString();
                currentOperation='';
                peviousInput='';
                document.getElementById('display').value=currentInput;

             }
          function clearDisplay(){
            currentInput='';
            peviousInput='';
            currentOperation='';
document.getElementById('display').value='';

        }
    </script>
</body>
</html>
